    <path d="M-3,125 C-2,100 -4,75 -2,50 C0,35 2,35 4,50 C6,75 4,100 5,125 C3,127 -1,127 -3,125 Z" fill="white" opacity="0.85"/>
    <!-- Trunk texture lines -->
    <line x1="-2" y1="65" x2="4" y2="65" stroke="white" stroke-width="0.5" opacity="0.25"/>
    <line x1="-2" y1="75" x2="4" y2="75" stroke="white" stroke-width="0.5" opacity="0.25"/>
    <line x1="-2" y1="85" x2="4" y2="85" stroke="white" stroke-width="0.5" opacity="0.25"/>
    <line x1="-2" y1="95" x2="4" y2="95" stroke="white" stroke-width="0.5" opacity="0.25"/>
    <line x1="-2" y1="105" x2="4" y2="105" stroke="white" stroke-width="0.5" opacity="0.25"/>
    <line x1="-2" y1="115" x2="4" y2="115" stroke="white" stroke-width="0.5" opacity="0.25"/>

