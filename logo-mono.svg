    <path d="M3,50 C18,52 32,58 42,72" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.65"/>
    <path d="M42,72 C38,62 28,56 18,54 C26,56 34,58 40,66 C34,68 24,66 18,62 C26,70 36,74 42,72 Z" fill="white" opacity="0.5"/>

    <!-- Left frond 1 -->
    <path d="M-1,46 C-13,35 -30,28 -48,30" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M-48,30 C-40,24 -28,22 -18,26 C-26,27 -36,26 -44,28 C-36,32 -26,34 -18,34 C-28,36 -40,34 -48,30 Z" fill="white" opacity="0.7"/>
    <path d="M-10,40 C-14,34 -20,30 -26,28" stroke="white" stroke-width="0.6" fill="none" opacity="0.35"/>
    <path d="M-18,38 C-22,32 -28,29 -34,28" stroke="white" stroke-width="0.6" fill="none" opacity="0.35"/>
    <path d="M-28,36 C-32,31 -38,29 -44,29" stroke="white" stroke-width="0.6" fill="none" opacity="0.35"/>

    <!-- Left frond 2 -->
    <path d="M-2,48 C-18,42 -36,42 -53,50" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.75"/>
    <path d="M-53,50 C-46,42 -34,38 -24,40 C-32,42 -42,42 -50,46 C-42,50 -32,52 -24,50 C-34,54 -46,54 -53,50 Z" fill="white" opacity="0.6"/>

    <!-- Left frond 3 -->
    <path d="M-1,50 C-16,52 -30,58 -40,72" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.65"/>
    <path d="M-40,72 C-36,62 -26,56 -16,54 C-24,56 -32,58 -38,66 C-32,68 -22,66 -16,62 C-24,70 -34,74 -40,72 Z" fill="white" opacity="0.5"/>

    <!-- Date clusters -->
    <!-- Right -->
    <path d="M8,52 C12,58 14,64 12,70" stroke="white" stroke-width="0.8" fill="none" opacity="0.5"/>
    <ellipse cx="11" cy="72" rx="2.5" ry="3.5" fill="white" opacity="0.8"/>
    <ellipse cx="14" cy="69" rx="2.2" ry="3.2" fill="white" opacity="0.7"/>
    <ellipse cx="8" cy="70" rx="2" ry="3" fill="white" opacity="0.6"/>
    <ellipse cx="12" cy="66" rx="1.8" ry="2.8" fill="white" opacity="0.55"/>

    <!-- Left -->
    <path d="M-6,52 C-10,58 -12,64 -10,70" stroke="white" stroke-width="0.8" fill="none" opacity="0.5"/>
    <ellipse cx="-9" cy="72" rx="2.5" ry="3.5" fill="white" opacity="0.8"/>
    <ellipse cx="-12" cy="69" rx="2.2" ry="3.2" fill="white" opacity="0.7"/>
    <ellipse cx="-6" cy="70" rx="2" ry="3" fill="white" opacity="0.6"/>
