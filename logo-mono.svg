  <!-- === DECORATIVE DIVIDER === -->
  <g transform="translate(200, 152)">
    <line x1="-80" y1="0" x2="-15" y2="0" stroke="white" stroke-width="0.6" opacity="0.35"/>
    <line x1="15" y1="0" x2="80" y2="0" stroke="white" stroke-width="0.6" opacity="0.35"/>
    <path d="M0,-4 L4,0 L0,4 L-4,0 Z" fill="white" opacity="0.45"/>
  </g>

  <!-- === ENGLISH TEXT === -->
  <text x="200" y="185" text-anchor="middle" font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="36" font-weight="700" fill="white" letter-spacing="2">House of Jabri</text>

  <text x="200" y="210" text-anchor="middle" font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="18" font-weight="400" fill="white" letter-spacing="4" opacity="0.8">
    <tspan letter-spacing="4">FOR DATES</tspan>
  </text>

  <!-- === THIN SEPARATOR === -->
  <g transform="translate(200, 225)">
    <line x1="-50" y1="0" x2="-8" y2="0" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="1.5" fill="white" opacity="0.4"/>
    <line x1="8" y1="0" x2="50" y2="0" stroke="white" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- === ARABIC TEXT === -->
  <text x="200" y="258" text-anchor="middle" font-family="'Cairo', 'Noto Sans Arabic', 'Geeza Pro', 'Arial', sans-serif" font-size="28" font-weight="700" fill="white" direction="rtl" opacity="0.8">&#1576;&#1610;&#1578; &#1580;&#1576;&#1585;&#1610; &#1604;&#1604;&#1578;&#1605;&#1608;&#1585;</text>

  <!-- === TAGLINE === -->
  <text x="200" y="285" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif" font-size="9" font-weight="400" fill="white" letter-spacing="3" opacity="0.45">
    <tspan>PREMIUM JORDANIAN DATES</tspan>
  </text>

  <!-- === BOTTOM ACCENT LINE === -->
  <g transform="translate(200, 300)">
    <line x1="-35" y1="0" x2="35" y2="0" stroke="white" stroke-width="0.8" opacity="0.2"/>
  </g>
</svg>