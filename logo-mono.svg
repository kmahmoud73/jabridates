    <path d="M3,46 C15,35 32,28 50,30" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M50,30 C42,24 30,22 20,26 C28,27 38,26 46,28 C38,32 28,34 20,34 C30,36 42,34 50,30 Z" fill="white" opacity="0.7"/>
    <path d="M12,40 C16,34 22,30 28,28" stroke="white" stroke-width="0.6" fill="none" opacity="0.35"/>
    <path d="M20,38 C24,32 30,29 36,28" stroke="white" stroke-width="0.6" fill="none" opacity="0.35"/>
    <path d="M30,36 C34,31 40,29 46,29" stroke="white" stroke-width="0.6" fill="none" opacity="0.35"/>

    <!-- Right frond 2 -->
    <path d="M4,48 C20,42 38,42 55,50" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.75"/>
    <path d="M55,50 C48,42 36,38 26,40 C34,42 44,42 52,46 C44,50 34,52 26,50 C36,54 48,54 55,50 Z" fill="white" opacity="0.6"/>

