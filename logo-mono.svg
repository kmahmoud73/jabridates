<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <!-- Monochrome white version for dark backgrounds -->

  <!-- === PALM TREE ICON === -->
  <g transform="translate(200, 8)">
